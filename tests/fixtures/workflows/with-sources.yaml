name: sources-workflow
description: A workflow with sources section

inputs:
  - path: docs/prd.md
    type: prd
    label: prd

sources:
  include:
    - "**/*.ts"
  exclude:
    - "**/*.test.ts"

steps:
  - id: risk-analysis
    name: Risk Analysis
    type: risk-analysis
    prompt_template: |
      Analyze risks:
      {{inputs.prd}}
      {{sources.summary}}
    output_schema: schemas/risk-analysis.json
