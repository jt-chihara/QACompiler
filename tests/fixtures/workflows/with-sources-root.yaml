name: sources-root-workflow
description: A workflow with sources.root specified

inputs:
  - path: docs/prd.md
    type: prd
    label: prd

sources:
  root: "./source-projects/typescript"
  include:
    - "**/*.ts"

steps:
  - id: risk-analysis
    name: Risk Analysis
    type: risk-analysis
    prompt_template: |
      Analyze risks:
      {{inputs.prd}}
    output_schema: schemas/risk-analysis.json
