name: multi-step-workflow
description: A two-step workflow for testing

inputs:
  - path: docs/prd.md
    type: prd
    label: prd

llm:
  provider: openai
  model: gpt-4o
  temperature: 0

steps:
  - id: risk-analysis
    name: Risk Analysis
    type: risk-analysis
    prompt_template: |
      Analyze risks:
      {{inputs.prd}}
    output_schema: schemas/risk-analysis.json

  - id: test-plan
    name: Test Plan
    type: test-plan
    depends_on:
      - risk-analysis
    prompt_template: |
      Create test plan based on:
      {{steps.risk-analysis.output}}
    output_schema: schemas/test-plan.json
