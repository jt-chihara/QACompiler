name: circular-workflow
description: Invalid workflow with circular dependency

inputs:
  - path: docs/prd.md
    type: prd
    label: prd

steps:
  - id: step-a
    name: Step A
    type: custom
    depends_on:
      - step-c
    prompt_template: "Analyze"
    output_schema: schemas/risk-analysis.json

  - id: step-b
    name: Step B
    type: custom
    depends_on:
      - step-a
    prompt_template: "Analyze"
    output_schema: schemas/risk-analysis.json

  - id: step-c
    name: Step C
    type: custom
    depends_on:
      - step-b
    prompt_template: "Analyze"
    output_schema: schemas/risk-analysis.json
